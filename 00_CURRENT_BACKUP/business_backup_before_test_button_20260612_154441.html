<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>返礼品登録｜事業者基本情報フォーム</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f6f3ef;
      color: #1f2933;
      line-height: 1.8;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff, #edf3fb);
      border-radius: 24px;
      padding: 34px 26px;
      margin-bottom: 24px;
      border: 1px solid #e5e0d8;
      box-shadow: 0 12px 30px rgba(31, 58, 95, 0.08);
    }

    .label {
      display: inline-block;
      background: #1f3a5f;
      color: white;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      color: #1f3a5f;
      font-size: 30px;
      line-height: 1.4;
    }

    .lead {
      color: #6b7280;
      margin: 0;
      font-size: 15px;
    }

    form {
      display: grid;
      gap: 20px;
    }

    .section {
      background: white;
      border: 1px solid #e5e0d8;
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 8px 20px rgba(31, 41, 51, 0.04);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #e5e0d8;
      padding-bottom: 12px;
      margin-bottom: 18px;
    }

    .num {
      width: 30px;
      height: 30px;
      background: #1f3a5f;
      color: white;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    h2 {
      margin: 0;
      color: #1f3a5f;
      font-size: 19px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    .required {
      color: #b91c1c;
      font-size: 12px;
      margin-left: 4px;
    }

    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d7d2ca;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      background: white;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1f3a5f;
      box-shadow: 0 0 0 4px rgba(31, 58, 95, 0.12);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .note {
      background: #fffaf2;
      border: 1px solid #ead8bd;
      color: #6b4e25;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .hidden {
      display: none;
    }

    button {
      border: none;
      background: #1f3a5f;
      color: white;
      padding: 14px 38px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(31, 58, 95, 0.22);
    }

    .actions {
      text-align: center;
    }

    .footer-note {
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      margin-top: 14px;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: auto;
      }

      h1 {
        font-size: 24px;
      }

      .section {
        padding: 22px 18px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <span class="label">ふるサポ埼玉</span>
      <h1>返礼品登録<br>事業者基本情報フォーム</h1>
      <p class="lead">
        ふるさと納税の返礼品登録に必要な事業者さま情報を確認するためのフォームです。<br>
        現時点で分かる範囲でご入力ください。未定の項目は「未定」とご記入いただいて大丈夫です。
      </p>
    </section>

    <form id="businessForm">
      <section class="section">
        <div class="section-title">
          <span class="num">1</span>
          <h2>事業者さま情報</h2>
        </div>

        <div class="grid">
          <div class="field full">
            <label>事業者名<span class="required">必須</span></label>
            <input name="business_name" required>
          </div>

          <div class="field">
            <label>郵便番号<span class="required">必須</span></label>
            <input name="postal_code" placeholder="例：330-0000" required>
          </div>

          <div class="field">
            <label>電話番号<span class="required">必須</span></label>
            <input name="phone" type="tel" required>
          </div>

          <div class="field full">
            <label>住所<span class="required">必須</span></label>
            <input name="address" required>
          </div>

          <div class="field">
            <label>FAX番号</label>
            <input name="fax" type="tel">
          </div>

          <div class="field">
            <label>メールアドレス<span class="required">必須</span></label>
            <input name="email" type="email" required>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <span class="num">2</span>
          <h2>ご担当者さま情報</h2>
        </div>

        <div class="grid">
          <div class="field">
            <label>ふるさと納税担当者名<span class="required">必須</span></label>
            <input name="tax_contact_name" required>
          </div>

          <div class="field">
            <label>担当者さま連絡先<span class="required">必須</span></label>
            <input name="tax_contact_phone" type="tel" required>
          </div>

          <div class="field">
            <label>緊急時の担当者名</label>
            <input name="emergency_contact_name">
          </div>

          <div class="field">
            <label>緊急時連絡先</label>
            <input name="emergency_contact_phone" type="tel">
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <span class="num">3</span>
          <h2>WEB掲載用情報</h2>
        </div>

        <div class="note">
          返礼品ページやポータルサイト上で表示する名称・連絡先として使用する情報です。
        </div>

        <div class="grid">
          <div class="field full">
            <label>WEB用会社名称・屋号<span class="required">必須</span></label>
            <input name="web_display_name" required>
          </div>

          <div class="field">
            <label>WEB用電話番号</label>
            <input name="web_phone" type="tel">
          </div>

          <div class="field">
            <label>営業時間</label>
            <input name="business_hours" placeholder="例：10:00〜18:00">
          </div>

          <div class="field">
            <label>定休日</label>
            <input name="closed_days" placeholder="例：月曜日、不定休など">
          </div>

          <div class="field">
            <label>公式サイトURL</label>
            <input name="website_url" type="url" placeholder="https://...">
          </div>

          <div class="field">
            <label>Instagram等SNS</label>
            <input name="sns_url" type="url" placeholder="https://...">
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <span class="num">4</span>
          <h2>画像・文章の使用確認</h2>
        </div>

        <div class="grid">
          <div class="field full">
            <label>公式サイト・SNSの画像や文章を、ふるさと納税サイトに使用してもよいですか？<span class="required">必須</span></label>
            <select name="content_usage_permission" required>
              <option value="">選択してください</option>
              <option>使用してよい</option>
              <option>事前確認が必要</option>
              <option>使用不可</option>
              <option>まだ分からない</option>
            </select>
          </div>

          <div class="field full">
            <label>補足・条件があればご記入ください</label>
            <textarea name="content_usage_note" placeholder="例：Instagramの写真は使用可、公式サイトの文章は事前確認希望 など"></textarea>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <span class="num">5</span>
          <h2>配送・出荷に関する基本情報</h2>
        </div>

        <div class="grid">
          <div class="field">
            <label>主に利用する宅配業者</label>
            <select name="delivery_company">
              <option value="">選択してください</option>
              <option>ヤマト運輸</option>
              <option>佐川急便</option>
              <option>日本郵便</option>
              <option>その他</option>
              <option>未定</option>
            </select>
          </div>

          <div class="field">
            <label>出荷場所は上記住所と同じですか？<span class="required">必須</span></label>
            <select id="shippingSame" name="shipping_address_same" required>
              <option value="">選択してください</option>
              <option>同じ</option>
              <option>異なる</option>
              <option>未定</option>
            </select>
          </div>
        </div>
      </section>

      <section class="section hidden" id="shippingDetails">
        <div class="section-title">
          <span class="num">6</span>
          <h2>出荷場所が異なる場合</h2>
        </div>

        <div class="grid">
          <div class="field full">
            <label>出荷場所名</label>
            <input name="shipping_place_name">
          </div>

          <div class="field">
            <label>出荷場所郵便番号</label>
            <input name="shipping_postal_code" placeholder="例：330-0000">
          </div>

          <div class="field">
            <label>出荷場所電話番号</label>
            <input name="shipping_phone" type="tel">
          </div>

          <div class="field full">
            <label>出荷場所住所</label>
            <input name="shipping_address">
          </div>

          <div class="field">
            <label>出荷担当者名</label>
            <input name="shipping_contact_name">
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-title">
          <span class="num">7</span>
          <h2>その他</h2>
        </div>

        <div class="grid">
          <div class="field full">
            <label>現在困っていること・確認したいこと</label>
            <textarea name="current_issues" placeholder="例：何を準備すればよいか分からない、写真がない、発送方法が不安 など"></textarea>
          </div>

          <div class="field full">
            <label>備考</label>
            <textarea name="notes"></textarea>
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="submit">入力内容を送信する</button>
      </div>

      <p class="footer-note">
        ご入力いただいた内容は、返礼品登録・掲載準備・委託業者との連携のために使用いたします。
      </p>
    </form>
  </main>

  <script>
    const shippingSame = document.getElementById("shippingSame");
    const shippingDetails = document.getElementById("shippingDetails");

    shippingSame.addEventListener("change", function () {
      if (this.value === "異なる") {
        shippingDetails.classList.remove("hidden");
      } else {
        shippingDetails.classList.add("hidden");
      }
    });

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxEMn_0UO_nMEhaz8abGwSk-6JYqOFUgOravRdvLkgHvzyKgGU5LqIFbZoFGxGTj6onmg/exec";

    document.getElementById("businessForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const submitButton = this.querySelector('button[type="submit"]');
      submitButton.disabled = true;
      submitButton.textContent = "送信中...";

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());

      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(data)
        });

        alert("送信しました。ありがとうございます。");
        this.reset();
        shippingDetails.classList.add("hidden");

      } catch (error) {
        console.error(error);
        alert("送信中にエラーが発生しました。時間をおいて再度お試しください。");

      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "入力内容を送信する";
      }
    });
  </script>
</body>
</html>
